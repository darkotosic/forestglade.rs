[build]
  base = "."
  command = "rm -rf apps/web/.next apps/web/out packages/project-data/dist && npm ci --include=dev && npm run build:project-data && npm run build:web"
  publish = "apps/web/out"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "11.4.2"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/api/*"
  to = "https://forestglade-api.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
