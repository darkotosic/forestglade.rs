[build]
  base = "."
  command = "npm ci --include=dev && npm --workspace apps/web run build"
  publish = "apps/web/out"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"

[[redirects]]
  from = "/api/*"
  to = "https://forestglade-api.onrender.com/api/:splat"
  status = 200
  force = true
