name: CI
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/forestglade
      NODE_ENV: test
      ADMIN_BOOTSTRAP_TOKEN: test-bootstrap-token
      SESSION_COOKIE_NAME: fg_admin_session
      SESSION_DAYS: 7
      CORS_ORIGIN: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      CLOUDINARY_FOLDER: forestglade-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run prisma:validate
      - run: npm run build:project-data
      - run: npm run typecheck:api
      - run: npm run lint:web
      - run: npm run test
      - run: npm run build:api
      - run: npm run build:web
      - run: docker build -t forestglade-api .
      - run: docker run --rm forestglade-api node --version
