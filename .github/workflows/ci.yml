name: CI
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/forestglade
      NODE_ENV: test
      ADMIN_BOOTSTRAP_TOKEN: test-bootstrap-token
      SESSION_COOKIE_NAME: fg_admin_session
      SESSION_DAYS: 7
      CORS_ORIGIN: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      CLOUDINARY_FOLDER: forestglade-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --include=dev
      - run: npm --workspace packages/project-data run build
      - run: npm --workspace apps/api run prisma:generate
      - run: npm --workspace apps/api run lint
      - run: npm --workspace apps/api run build
      - run: npm --workspace apps/web run lint
      - run: npm --workspace apps/web run build
