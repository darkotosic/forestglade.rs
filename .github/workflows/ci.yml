name: CI
on:
  push:
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/forestglade
      NODE_ENV: test
      ADMIN_BOOTSTRAP_TOKEN: test-bootstrap-token
      SESSION_COOKIE_NAME: fg_admin_session
      SESSION_DAYS: 7
      CORS_ORIGIN: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: test
      CLOUDINARY_API_SECRET: test
      CLOUDINARY_FOLDER: forestglade-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --global npm@11.4.2
      - run: npm --version
      - run: node -e "const pkg=require('./package.json'); const expected=pkg.packageManager.split('@').pop(); const actual=require('child_process').execFileSync('npm',['--version'],{encoding:'utf8'}).trim(); if (actual !== expected) throw new Error(`Expected npm ${expected}, got ${actual}`);"
      - run: npm ci
      - run: npm run format:check
      - run: npm run prisma:validate
      - run: npm run build:project-data
      - run: npm run typecheck:api
      - run: npm run typecheck:web
      - run: npm run lint:web
      - run: npm run test
      - run: npm run build:api
      - run: npm run build:web
      - run: npm run verify:repository
      - run: docker build -t forestglade-api .
      - name: Docker smoke test
        run: |
          docker run --name forestglade-api-smoke -d \
            -e NODE_ENV=production \
            -e PORT=10000 \
            -e DATABASE_URL=postgresql://user:pass@localhost:5432/forestglade \
            -e CORS_ORIGIN=http://localhost:3000 \
            -e ADMIN_BOOTSTRAP_TOKEN=test-bootstrap-token \
            -e SESSION_COOKIE_NAME=fg_admin_session \
            -e SESSION_DAYS=7 \
            -e CLOUDINARY_CLOUD_NAME=test \
            -e CLOUDINARY_API_KEY=test \
            -e CLOUDINARY_API_SECRET=test \
            -e CLOUDINARY_FOLDER=forestglade-test \
            -p 10000:10000 \
            forestglade-api
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:10000/health; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:10000/health
          docker stop --time 15 forestglade-api-smoke
          test "$(docker inspect forestglade-api-smoke --format='{{.State.ExitCode}}')" = "0"
          docker rm forestglade-api-smoke
